<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
</head>
<body>
<script>
(async () => {
    try {
        const res = await fetch('../api/auth/me.php', { credentials: 'include' });
        if (!res.ok) {
            window.location.replace('../index.html');
            return;
        }
        const payload = await res.json();
        const roleName = String(payload?.data?.role_name || '').toLowerCase();

        let target = 'admin_dashboard.html';
        if (roleName.includes('teacher')) target = 'teacher_dashboard.html';
        if (roleName.includes('learner') || roleName.includes('student')) target = 'learner_dashboard.html';

        window.location.replace(target);
    } catch (e) {
        window.location.replace('admin_dashboard.html');
    }
})();
</script>
</body>
</html>
